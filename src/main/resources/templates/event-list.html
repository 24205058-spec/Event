<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Events | EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><span class="brand-icon">🎪</span><span>EventFlow</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/events}" class="active">Events</a></li>
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/events/create}" class="btn-nav">+ Create</a></li>
        </ul>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1>Upcoming Events</h1>
        <p>Discover and manage all scheduled events</p>
    </div>
</div>

<div class="container section">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <!-- Search Form -->
    <form class="search-form" method="get" th:action="@{/events}">
        <input type="text" name="title" placeholder="Search by title..." th:value="${title}" class="search-input"/>
        <input type="text" name="venue" placeholder="Filter by venue..."  th:value="${venue}" class="search-input"/>
        <input type="hidden" name="sortBy"  th:value="${sortBy}"/>
        <input type="hidden" name="sortDir" th:value="${sortDir}"/>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/events}" class="btn btn-outline">Clear</a>
    </form>

    <!-- Events Table -->
    <div class="table-wrapper" th:if="${events != null and !events.empty}">
        <table class="data-table">
            <thead>
            <tr>
                <th><a th:href="@{/events(title=${title},venue=${venue},sortBy='title',sortDir=${sortBy=='title'?reverseSortDir:'asc'})}">Title</a></th>
                <th><a th:href="@{/events(title=${title},venue=${venue},sortBy='venue',sortDir=${sortBy=='venue'?reverseSortDir:'asc'})}">Venue</a></th>
                <th><a th:href="@{/events(title=${title},venue=${venue},sortBy='eventDate',sortDir=${sortBy=='eventDate'?reverseSortDir:'asc'})}">Date</a></th>
                <th>Time</th>
                <th>Duration</th>
                <th>Organizer</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="event : ${events}">
                <td th:text="${event.title}"></td>
                <td th:text="${event.venue}"></td>
                <td th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}"></td>
                <td th:text="${#temporals.format(event.startTime, 'HH:mm')}"></td>
                <td th:text="${event.durationInMinutes + ' min'}"></td>
                <td th:text="${event.organizerName}"></td>
                <td class="actions-cell">
                    <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-sm btn-primary">View</a>
                    <a th:href="@{/events/{id}/auth(id=${event.id},action='edit')}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/events/{id}/auth(id=${event.id},action='delete')}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${events == null or events.empty}" class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>No events found</h3>
        <p>Try adjusting your search or <a th:href="@{/events/create}">create a new event</a>.</p>
    </div>

    <!-- Pagination -->
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/events(title=${title},venue=${venue},page=${currentPage-1},sortBy=${sortBy},sortDir=${sortDir})}"
           class="btn btn-outline btn-sm">← Prev</a>
        <span class="page-info" th:text="'Page ' + (${currentPage}+1) + ' of ' + ${totalPages}"></span>
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/events(title=${title},venue=${venue},page=${currentPage+1},sortBy=${sortBy},sortDir=${sortDir})}"
           class="btn btn-outline btn-sm">Next →</a>
    </div>
</div>

<footer class="footer"><div class="footer-inner"><p>&copy; 2025 EventFlow</p></div></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Event | EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><span class="brand-icon">🎪</span><span>EventFlow</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/events/create}" class="btn-nav active">+ Create</a></li>
        </ul>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1>Create New Event</h1>
        <p>Fill in the details to schedule your event</p>
    </div>
</div>

<div class="container section">
    <div th:if="${conflictError}" class="alert alert-error" th:text="${conflictError}"></div>

    <div class="form-card">
        <form th:action="@{/events/create}" th:object="${eventDTO}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label for="title">Event Title *</label>
                    <input type="text" id="title" th:field="*{title}" placeholder="e.g. Annual Tech Conference" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>
                <div class="form-group">
                    <label for="venue">Venue *</label>
                    <input type="text" id="venue" th:field="*{venue}" placeholder="e.g. City Convention Centre" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('venue')}" th:errors="*{venue}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="eventDate">Event Date *</label>
                    <input type="date" id="eventDate" th:field="*{eventDate}" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></span>
                </div>
                <div class="form-group">
                    <label for="startTime">Start Time *</label>
                    <input type="time" id="startTime" th:field="*{startTime}" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></span>
                </div>
                <div class="form-group">
                    <label for="durationInMinutes">Duration (minutes) *</label>
                    <input type="number" id="durationInMinutes" th:field="*{durationInMinutes}" min="15" max="1440" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('durationInMinutes')}" th:errors="*{durationInMinutes}"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="4" placeholder="Describe your event..." class="form-control"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="organizerName">Organizer Name *</label>
                    <input type="text" id="organizerName" th:field="*{organizerName}" placeholder="Your full name" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('organizerName')}" th:errors="*{organizerName}"></span>
                </div>
                <div class="form-group">
                    <label for="organizerEmail">Organizer Email *</label>
                    <input type="email" id="organizerEmail" th:field="*{organizerEmail}" placeholder="your@email.com" class="form-control"/>
                    <span class="field-error" th:if="${#fields.hasErrors('organizerEmail')}" th:errors="*{organizerEmail}"></span>
                </div>
            </div>

            <div class="form-hint">
                <p>⚠️ Remember your email — you'll need it to edit or delete this event.</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">Create Event</button>
                <a th:href="@{/events}" class="btn btn-outline btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer"><div class="footer-inner"><p>&copy; 2025 EventFlow</p></div></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify Email | EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><span class="brand-icon">🎪</span><span>EventFlow</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/events}" class="active">Events</a></li>
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/events/create}" class="btn-nav">+ Create</a></li>
        </ul>
    </div>
</nav>

<div class="container section">
    <div class="auth-card">
        <div class="auth-icon">🔐</div>
        <h2>Organizer Verification</h2>
        <p class="auth-subtitle">Enter the organizer email for <strong th:text="${event.title}"></strong> to proceed.</p>

        <div th:if="${authError}" class="alert alert-error" th:text="${authError}"></div>

        <form th:action="@{/events/{id}/auth(id=${event.id})}" method="post">
            <input type="hidden" name="action" th:value="${action}"/>
            <div class="form-group">
                <label for="organizerEmail">Organizer Email</label>
                <input type="email" id="organizerEmail" name="organizerEmail" placeholder="Enter organizer email..." class="form-control" required="required"/>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg" th:text="${'delete'.equals(action) ? 'Verify &amp; Delete' : 'Verify &amp; Edit'}">Verify</button>
                <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-outline btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer"><div class="footer-inner"><p>&copy; 2025 EventFlow</p></div></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

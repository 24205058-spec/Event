<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${event.title + ' | EventFlow'}">Event Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><span class="brand-icon">🎪</span><span>EventFlow</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/events}" class="active">Events</a></li>
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/events/create}" class="btn-nav">+ Create</a></li>
        </ul>
    </div>
</nav>

<div class="container section">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <a th:href="@{/events}" class="back-link">← Back to Events</a>

    <div class="detail-card">
        <div class="detail-header">
            <div class="detail-date-badge" th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}"></div>
            <h1 class="detail-title" th:text="${event.title}"></h1>
            <p class="detail-venue">📍 <span th:text="${event.venue}"></span></p>
        </div>

        <div class="detail-body">
            <div class="detail-grid">
                <div class="detail-item">
                    <span class="detail-label">Start Time</span>
                    <span class="detail-value" th:text="${#temporals.format(event.startTime, 'HH:mm')}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">End Time</span>
                    <span class="detail-value" th:text="${#temporals.format(event.endTime, 'HH:mm')}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Duration</span>
                    <span class="detail-value" th:text="${event.durationInMinutes + ' minutes'}"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Organizer</span>
                    <span class="detail-value" th:text="${event.organizerName}"></span>
                </div>
            </div>

            <div class="detail-description" th:if="${event.description != null and !event.description.blank}">
                <h3>About this Event</h3>
                <p th:text="${event.description}"></p>
            </div>

            <div class="detail-actions">
                <a th:href="@{/events/{id}/auth(id=${event.id},action='edit')}" class="btn btn-warning">✏️ Edit Event</a>
                <a th:href="@{/events/{id}/auth(id=${event.id},action='delete')}" class="btn btn-danger">🗑️ Delete Event</a>
            </div>
        </div>
    </div>
</div>

<footer class="footer"><div class="footer-inner"><p>&copy; 2025 EventFlow</p></div></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>

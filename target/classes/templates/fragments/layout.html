<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | EMS' : 'Event Management System'}">EMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand">
            <span class="brand-icon">🎪</span>
            <span>EventFlow</span>
        </a>
        <ul class="nav-links">
            <li><a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'active'">Home</a></li>
            <li><a th:href="@{/events}" th:classappend="${activePage == 'events'} ? 'active'">Events</a></li>
            <li><a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active'">Dashboard</a></li>
            <li><a th:href="@{/events/create}" th:classappend="${activePage == 'create'} ? 'active btn-nav'" class="btn-nav">+ Create</a></li>
        </ul>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container" style="margin-top:1rem;">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>
</div>

<!-- PAGE CONTENT -->
<main>
    <th:block th:replace="${content}"></th:block>
</main>

<footer class="footer">
    <div class="footer-inner">
        <p>&copy; 2025 EventFlow &mdash; Event Management System</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>

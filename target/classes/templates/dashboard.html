<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard | EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-brand"><span class="brand-icon">🎪</span><span>EventFlow</span></a>
        <ul class="nav-links">
            <li><a th:href="@{/}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            <li><a th:href="@{/dashboard}" class="active">Dashboard</a></li>
            <li><a th:href="@{/events/create}" class="btn-nav">+ Create</a></li>
        </ul>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1>Dashboard</h1>
        <p>Overview of all event statistics</p>
    </div>
</div>

<div class="container section">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-value" th:text="${totalEvents}">0</div>
            <div class="stat-label">Total Events</div>
        </div>
        <div class="stat-card stat-card--green">
            <div class="stat-icon">📅</div>
            <div class="stat-value" th:text="${upcomingEvents}">0</div>
            <div class="stat-label">Upcoming Events</div>
        </div>
        <div class="stat-card stat-card--blue">
            <div class="stat-icon">🗓️</div>
            <div class="stat-value" th:text="${todayEvents}">0</div>
            <div class="stat-label">Today's Events</div>
        </div>
        <div class="stat-card stat-card--purple">
            <div class="stat-icon">📍</div>
            <div class="stat-value" th:text="${distinctVenues}">0</div>
            <div class="stat-label">Active Venues</div>
        </div>
    </div>

    <div class="dashboard-bottom">
        <div class="venues-panel">
            <h3>Active Venues</h3>
            <ul class="venue-list" th:if="${venueList != null and !venueList.empty}">
                <li th:each="v : ${venueList}" th:text="${v}"></li>
            </ul>
            <p th:if="${venueList == null or venueList.empty}" class="empty-text">No venues yet</p>
        </div>
        <div class="quick-actions-panel">
            <h3>Quick Actions</h3>
            <a th:href="@{/events/create}" class="btn btn-primary">+ Create Event</a>
            <a th:href="@{/events}"        class="btn btn-outline" style="margin-top:0.5rem">View All Events</a>
        </div>
    </div>
</div>

<footer class="footer"><div class="footer-inner"><p>&copy; 2025 EventFlow</p></div></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
